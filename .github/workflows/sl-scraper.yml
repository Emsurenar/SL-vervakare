name: SL Övervakare

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch: 

permissions:
  contents: write # Viktigt: Låter boten spara "vilka larm som redan skickats"

jobs:
  run-sl-monitor:
    runs-on: ubuntu-latest

    steps:
    - name: Hämta kod
      uses: actions/checkout@v4

    - name: Sätt upp Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Installera beroenden
      run: |
        python -m pip install --upgrade pip
        cat > requirements.txt << EOF
        requests
        EOF
        pip install -r requirements.txt

    - name: Kör SL-övervakaren
      env:
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      run: python sl_monitor.py

    - name: Spara historik (Antispam)
      run: |
        git config --local user.email "sl-bot@github.local"
        git config --local user.name "SL Övervakare Bot"
        git add sent_deviations.txt || true
        if git diff --staged --quiet; then
          echo "Inga nya störningar att spara."
        else
          git commit -m "Sparar larmhistorik (antispam)"
          git push
        fi
